version: '3.8'

services:
  # 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-arbitrage-app
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_MODE=release
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD:-arbitrage123}
      - DB_NAME=crypto_arbitrage
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - arbitrage-network
    volumes:
      - ./logs:/app/logs

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: crypto-arbitrage-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-arbitrage123}
      MYSQL_DATABASE: crypto_arbitrage
      MYSQL_USER: arbitrage
      MYSQL_PASSWORD: ${DB_PASSWORD:-arbitrage123}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./configs/mysql.cnf:/etc/mysql/conf.d/custom.cnf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-arbitrage123}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arbitrage-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: crypto-arbitrage-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - arbitrage-network

  # 前端服务 (生产环境)
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: crypto-arbitrage-frontend
    ports:
      - "80:80"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - arbitrage-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  arbitrage-network:
    driver: bridge
